name: Release Snap

on:
  workflow_call:
    secrets:
      # Snapcraft Store credentials for uploading and releasing snaps.
      # Generate at https://snapcraft.io/docs/registering-your-app
      # Export with: snapcraft export-login --snaps=<snap-name> --channels=<channels> -
      SNAPCRAFT_STORE_CREDENTIALS:
        required: true
      # Launchpad credential token, needed by `snapcraft remote-build`.
      # See https://launchpad.net/+apidoc for token generation.
      LAUNCHPAD_TOKEN:
        required: true

jobs:
  changes:
    name: Determine modified snaps
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Find snapcraft.yaml changes
        id: changed-files
        uses: tj-actions/changed-files@v46
        with:
          files: "**/snapcraft.yaml"
      - name: Build release matrix from changed versions and platforms
        id: build-matrix
        run: |
          if [[ -z "$CHANGED_FILES" ]]; then
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          matrix='{"include":[]}'
          for file in $CHANGED_FILES; do
            # Extract the version folder (e.g. "1.2" from "1.2/snap/snapcraft.yaml")
            version="$(echo "$file" | cut -d'/' -f1)"
            # Parse platforms from the snapcraft.yaml
            platforms="$(yq -r '.platforms | keys | .[]' "$file")"
            for platform in $platforms; do
              matrix="$(echo "$matrix" | jq -c --arg v "$version" --arg p "$platform" '.include += [{"version": $v, "platform": $p}]')"
            done
          done
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}

  release:
    name: Release ${{ matrix.version }} (${{ matrix.platform }})
    runs-on: ubuntu-24.04
    needs: [changes]
    if: ${{ fromJSON(needs.changes.outputs.matrix).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo snap install concierge --classic
          sudo concierge prepare -p crafts --extra-snaps=just,yq
      - name: Build and release snap
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          SNAPCRAFT_LAUNCHPAD_TOKEN: ${{ secrets.LAUNCHPAD_TOKEN }}
        run: |
          just remote-build ${{ matrix.version }} ${{ matrix.platform }}
          just release ${{ matrix.version }}
      - name: Open SSH session on failure
        if: ${{ failure() && (runner.debug == '1') }}
        uses: mxschmitt/action-tmate@v3
        with:
          timeout-minutes: 30
          limit-access-to-actor: true
