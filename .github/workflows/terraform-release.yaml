name: Release Terraform module

on:
  workflow_call:
    inputs:
      terraform-tag-prefix:
        description: "Tag prefix to use for the Terraform release tag."
        default: 'tf-'
        required: false
        type: string
      terraform-tag-suffix:
        description: "Tag suffix to append to the Terraform release tag."
        default: ''
        required: false
        type: string
      terraform-path:
        description: "Path to the terraform directory, relative to the repository root."
        default: 'terraform'
        required: false
        type: string
    secrets:
      OBSERVABILITY_NOCTUA_TOKEN:
        required: true

jobs:
  release:
    name: Release the Terraform module
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate branch format
        id: validate-branch
        env:
          GIT_BRANCH: ${{ github.ref_name }}
        run: |
          # Only allow tagging on branches matching track/<major>.<minor>
          if [[ "$GIT_BRANCH" =~ ^track/[0-9]+\.[0-9]+$ ]]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "Branch '$GIT_BRANCH' does not match track/<major>.<minor> format. Skipping."
            echo "valid=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Check if tag should be created
        if: steps.validate-branch.outputs.valid == 'true'
        id: check-changes
        env:
          TERRAFORM_PATH: ${{ inputs.terraform-path }}
          TAG_PREFIX: ${{ inputs.terraform-tag-prefix }}
          TAG_SUFFIX: ${{ inputs.terraform-tag-suffix }}
          GIT_BRANCH: ${{ github.ref_name }}
        run: |
          # Extract major.minor from the track branch name
          track_version="${GIT_BRANCH#track/}"

          # Build the tag pattern to find existing tags for this major.minor
          # Pattern: <prefix><major>.<minor>.*<suffix>
          # e.g., tf-1.0.*-cos or tf-1.0.* (if no suffix)
          tag_pattern="${TAG_PREFIX}${track_version}.*${TAG_SUFFIX}"

          # Find the latest tag matching this pattern (sorted by version)
          # Use git tag with version sorting to get the highest patch version
          latest_tag=$(git tag --list "$tag_pattern" --sort=-version:refname | head -n1)

          if [ -z "$latest_tag" ]; then
            # No existing tag for this major.minor - first release, should create
            echo "No existing tag found matching pattern '$tag_pattern'. First release for this version."
            echo "should_create=true" >> "$GITHUB_OUTPUT"
          else
            # Tag exists - check if there are differences in terraform dir
            echo "Found latest tag: $latest_tag"
            if git diff --quiet "$latest_tag"..HEAD -- "$TERRAFORM_PATH/"; then
              echo "No changes in $TERRAFORM_PATH since $latest_tag. Skipping."
              echo "should_create=false" >> "$GITHUB_OUTPUT"
            else
              echo "Changes detected in $TERRAFORM_PATH since $latest_tag."
              echo "should_create=true" >> "$GITHUB_OUTPUT"
            fi
          fi
      - name: Create Terraform tag
        if: steps.validate-branch.outputs.valid == 'true' && steps.check-changes.outputs.should_create == 'true'
        env:
          TERRAFORM_PATH: ${{ inputs.terraform-path }}
          TAG_PREFIX: ${{ inputs.terraform-tag-prefix }}
          TAG_SUFFIX: ${{ inputs.terraform-tag-suffix }}
          GIT_BRANCH: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.OBSERVABILITY_NOCTUA_TOKEN }}
        run: |
          # Extract semantic version from the track branch name
          track_version="${GIT_BRANCH#track/}"
          # Calculate patch version: number of commits touching terraform dir since diverging from main
          git fetch origin main
          merge_base=$(git merge-base HEAD origin/main)
          patch=$(git rev-list --count "$merge_base"..HEAD -- "$TERRAFORM_PATH/")
          # Build the tag
          tag="${TAG_PREFIX}${track_version}.${patch}${TAG_SUFFIX}"
          echo "Creating tag: $tag"
          # Configure git with Noctua identity and token for push
          git config --global user.email "webops+observability-noctua-bot@canonical.com"
          git config --global user.name "Noctua"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          # Create and push the annotated tag
          git log -1 --pretty=%B > tag-message
          git tag --annotate "$tag" --file=tag-message
          rm -f tag-message
          git push origin "$tag"
