name: Tiobe TiCS Analysis

on:
  workflow_call:
    inputs:
      charm-path:
        description: |
          Path to the command runner that runs unit tests and produces coverage. Defaults to the current working directory.
          If 'charm-paths' is also provided, 'charm-paths' takes precedence and this input is ignored.
        default: '.'
        required: false
        type: string
      charm-paths:
        description: |
          JSON list of charm paths (e.g. '["charms/foo", "charms/bar"]').
          If provided, takes precedence over 'charm-path'.
          Each path will be processed as a separate matrix entry.
        default: ''
        required: false
        type: string
      lockfile-path:
        description: "Path to the lockfile folder (or requirements.txt). Useful for monorepos, where the root doesn't have a lockfile. If empty, `charm-path` is used."
        default: ""
        required: false
        type: string
      tiobe-project-name:
        description: "Name under which this project is registered in Tiobe. Defaults to repository name."
        default: ""
        required: false
        type: string
      coverage-folder:
        description: "Folder under which the coverage xml report exists."
        default: "cover"
        required: false
        type: string

jobs:
  resolve-charm-paths:
    uses: canonical/observability/.github/workflows/_resolve-charm-paths.yaml@v1
    with:
      charm-path: ${{ inputs.charm-path }}
      charm-paths: ${{ inputs.charm-paths }}
      filter-by-changes: false

  scan:
    name: Scan and upload (${{ matrix.charm-path }})
    needs: [resolve-charm-paths]
    runs-on: [self-hosted, linux, amd64, tiobe, jammy]
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        charm-path: ${{ fromJSON(needs.resolve-charm-paths.outputs.charm-paths) }}
    steps:
      - name: Checkout the project
        uses: actions/checkout@v6
        with:
          repository: canonical/${{ github.event.repository.name }}

      - name: Install dependencies
        run: |
          sudo snap install charmcraft --classic
          sudo apt update && sudo apt install -y pipx
          pipx install "coverage[toml]"
          pipx install tox
          sudo snap install astral-uv --classic

      - name: Generate unittest coverage report
        env:
          CHARM_PATH: ${{ matrix.charm-path }}
          COVERAGE_FOLDER: ${{ inputs.coverage-folder }}
        run: |
          base_wd="$(pwd)"
          cd "${CHARM_PATH}"
          tox -e unit && coverage xml -o "${base_wd}/${CHARM_PATH}/${COVERAGE_FOLDER}/cobertura.xml"

      - name: Activate and prepare Python virtual environment
        env:
          CHARM_PATH: ${{ matrix.charm-path }}
          LOCKFILE_PATH: ${{ inputs.lockfile-path }}
        run: |
          # Use LOCKFILE_PATH (if not empty) to create the virtual environment, otherwise use CHARM_PATH
          VENV_PATH="$LOCKFILE_PATH"
          if [[ -z "$LOCKFILE_PATH" ]]; then
            VENV_PATH="$CHARM_PATH"
          fi

          pushd "${VENV_PATH}"
          if [[ -f uv.lock ]]; then
            uv sync --all-extras --all-groups
            source .venv/bin/activate
          else 
             python -m venv .venv
             source .venv/bin/activate
             uv pip install -r requirements.txt
          fi
          uv pip install pylint flake8
          echo "PATH=$PATH" >> "$GITHUB_ENV"
          popd

      - name: Run TICS analysis with github-action
        uses: tiobe/tics-github-action@v3
        with:
          mode: qserver
          project: ${{ inputs.tiobe-project-name || github.event.repository.name }}
          viewerUrl: https://canonical.tiobe.com/tiobeweb/TICS/api/cfg?name=default
          ticsAuthToken: ${{ secrets.TICSAUTHTOKEN }}
          installTics: true
