name: Promote Charm

on:
  workflow_call:
    inputs:
      charm-path:
        description: |
          Path to the charm we want to promote. Defaults to the current working directory.
          If 'charm-paths' is also provided, 'charm-paths' takes precedence and this input is ignored.
        type: string
        default: '.'
        required: false
      charm-paths:
        description: |
          JSON list of charm paths (e.g. '["charms/foo", "charms/bar"]').
          If provided, takes precedence over 'charm-path'.
          Each path will be processed as a separate matrix entry.
        default: ''
        required: false
        type: string
      promotion:
        type: string
        required: true
      track:
        description: "Track of the charm on which we want the promotion to happen. Defaults to latest."
        type: string
        default: 'latest'
        required: false
    secrets:
      CHARMHUB_TOKEN:
        required: true

jobs:
  resolve-charm-paths:
    uses: canonical/observability/.github/workflows/_resolve-charm-paths.yaml@v1
    with:
      charm-path: ${{ inputs.charm-path }}
      charm-paths: ${{ inputs.charm-paths }}
      filter-by-changes: false

  promote:
    name: Promote Charm (${{ matrix.charm-path }})
    needs: [resolve-charm-paths]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        charm-path: ${{ fromJSON(needs.resolve-charm-paths.outputs.charm-paths) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set target channel
        env:
          PROMOTE_FROM: ${{ github.event.inputs.promotion }}
        run: |
          if [ "${PROMOTE_FROM}" == "edge -> beta" ]; then
            echo "promote-from=edge" >> "$GITHUB_ENV"
            echo "promote-to=beta" >> "$GITHUB_ENV"
          elif [ "${PROMOTE_FROM}" == "beta -> candidate" ]; then
            echo "promote-from=beta" >> "$GITHUB_ENV"
            echo "promote-to=candidate" >> "$GITHUB_ENV"
          elif [ "${PROMOTE_FROM}" == "candidate -> stable" ]; then
            echo "promote-from=candidate" >> "$GITHUB_ENV"
            echo "promote-to=stable" >> "$GITHUB_ENV"
          fi
      - name: Install a specific version of uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        run: |
          sudo snap install charmcraft --classic
          # Install noctua
          uv tool install git+https://github.com/lucabello/noctua
      - name: Promote charm
        env:
          CHARMCRAFT_AUTH: ${{ secrets.CHARMHUB_TOKEN }}
          CHARM_PATH: "${{ matrix.charm-path }}"
        run: |
          # Read the charm name from charmcraft.yaml / metadata.yaml
          cd "$CHARM_PATH"
          charm_name=$(yq .name metadata.yaml 2>/dev/null || yq .name charmcraft.yaml)
          if [[ "$charm_name" = "" ]]; then echo "Error: can't extract the charm name." && exit 1; fi
          # Run `noctua charm promote`
          noctua charm promote "$charm_name" \
            --from=${{ inputs.track }}/${{ env.promote-from }}
